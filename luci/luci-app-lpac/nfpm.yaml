# nFPM config for luci-app-lpac IPK (OpenWrt 24.x)
name: "luci-app-lpac"
platform: "linux"
arch: "all"
version: "${VERSION:-1.3.5}"
section: "net"
maintainer: "Medvedolog <Medvedolog@github.com>"
description: |
  eSIM profile management for OpenWrt.
  LuCI web UI + lpac-esim shell backend.
  Supports QMI, MBIM, AT backends via lpac 2.3.0.
depends:
  - luci-base
  - jq

contents:
  - src: ./pkgroot/usr/
    dst: /usr/
  - src: ./pkgroot/www/
    dst: /www/
  - src: ./pkgroot/etc/
    dst: /etc/

scripts:
  postinstall: ./scripts/postinst
  preremove: ./scripts/prerm
